version: '3.8'

services:
  # -------------------------------------------------------------------------
  # POSTGRESQL DATABASE
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: JustDtBase2027@
      POSTGRES_DB: saldanamusic
    volumes:
      - saldanamusic_db_vol:/var/lib/postgresql/data
    networks:
      - saldana_internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.3'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s

  # -------------------------------------------------------------------------
  # BACKEND API (NestJS)
  # -------------------------------------------------------------------------
  api:
    image: saldana_api:latest
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - DB_Type=postgres
      # Password encoded properly
      - DATABASE_URL=postgresql://postgres:JustDtBase2027%40@db:5432/saldanamusic?schema=public
      - NODE_ENV=production
      - PORT=3000
      # Mail Service (Hostinger)
      - SMTP_HOST=smtp.hostinger.com
      - SMTP_PORT=465
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # Google OAuth & Secrets
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_PASSWORD=${MASTER_PASSWORD}
      # Node.js memory limit (prevents OOM)
      - NODE_OPTIONS=--max-old-space-size=384
    networks:
      - saldana_internal
      - RenaceNet
    secrets:
      - SMTP_USER
      - SMTP_PASS
    depends_on:
      - db
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.saldana-api.rule=Host(`app.saldanamusic.com`) && PathPrefix(`/api`)"
        - "traefik.http.routers.saldana-api.entrypoints=websecure"
        - "traefik.http.routers.saldana-api.tls=true"
        - "traefik.http.routers.saldana-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.saldana-api.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"
        - "traefik.http.routers.saldana-api.priority=100"

  # -------------------------------------------------------------------------
  # FRONTEND WEB (Next.js)
  # -------------------------------------------------------------------------
  web:
    image: saldana_web:latest
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      - NEXT_PUBLIC_API_URL=https://app.saldanamusic.com/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NODE_OPTIONS=--max-old-space-size=384
    networks:
      - saldana_internal
      - RenaceNet
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.4'
          memory: 448M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.saldana-web.rule=Host(`app.saldanamusic.com`) || Host(`saldanamusic.com`)"
        - "traefik.http.routers.saldana-web.entrypoints=websecure"
        - "traefik.http.routers.saldana-web.tls=true"
        - "traefik.http.routers.saldana-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.saldana-web.loadbalancer.server.port=3000"
        - "traefik.docker.network=RenaceNet"

networks:
  saldana_internal:
    driver: overlay
  RenaceNet:
    external: true

secrets:
  SMTP_USER:
    external: true
  SMTP_PASS:
    external: true

volumes:
  saldanamusic_db_vol:
